# Tiny Tapeout project information
project:
  title: "Logic Gate Example"
  author: "Santoshi"
  discord: "Santoshi2006"
  description: "A simple Tiny Tapeout project demonstrating AND, OR, XOR, and NOT logic operations using Verilog."
  language: "Verilog"
  clock_hz: 0

  # Tile size
  tiles: "1x1"

  # Top module name
  top_module: "tt_um_logic_example"

  # Source files
  source_files:
    - "project.v"

# Pinout information
pinout:
  # Dedicated inputs
  ui[0]: "AND input A"
  ui[1]: "OR input A"
  ui[2]: "XOR input A"
  ui[3]: "NOT input"
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Dedicated outputs
  uo[0]: "AND output"
  uo[1]: "OR output"
  uo[2]: "XOR output"
  uo[3]: "NOT output"
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional IOs
  uio[0]: "AND input B"
  uio[1]: "OR input B"
  uio[2]: "XOR input B"
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change
yaml_version: 6
